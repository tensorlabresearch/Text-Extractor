name: Nightly Benchmark

# Runs the accuracy and latency benchmark suite nightly and on manual
# dispatch. Results are uploaded as a GitHub Actions artifact.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run benchmarks
        run: |
          node benchmarks/run-browser-benchmark.js || true
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/
          retention-days: 30
